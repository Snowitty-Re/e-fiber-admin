openapi: 3.1.0
info:
  title: e-fiber-admin API
  version: 1.0.0
  description: |
    API-first 外贸独立站后台系统。
    - Admin API: `/api/v1/admin/*` (JWT admin + RBAC)
    - Storefront API: `/api/v1/store/*` (JWT customer optional)
    详见 docs/04-api-design.md。
  contact:
    name: e-fiber-admin
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Admin authentication
  - name: System
    description: Health & metrics

paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /readyz:
    get:
      tags: [System]
      summary: Readiness probe (postgres + redis)
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/admin/auth/login:
    post:
      tags: [Auth]
      summary: Admin login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out

  /api/v1/admin/auth/me:
    get:
      tags: [Auth]
      summary: Current admin profile
      security:
        - AdminAuth: []
      responses:
        '200':
          description: Admin profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin access token (Authorization: Bearer <token>)

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, ready, unavailable]
        error:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Access token TTL in seconds

    AdminProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        roles:
          type: array
          items:
            type: string
        perms:
          type: array
          items:
            type: string
            description: "<resource>:<action>"

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          properties:
            admin:
              $ref: '#/components/schemas/AdminProfile'

    AdminProfileResponse:
      type: object
      properties:
        admin:
          $ref: '#/components/schemas/AdminProfile'

    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message, status]
          properties:
            code:
              type: string
            message:
              type: string
            status:
              type: integer
            request_id:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Dependency unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
